<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor IA - Atendimento Humano (SAF)</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-yellow: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .logo-container img {
            height: 50px;
            filter: brightness(1.5) drop-shadow(0 0 20px rgba(255, 255, 255, 0.7));
            transition: transform 0.3s ease;
        }

        .logo-container img:hover {
            transform: scale(1.05);
        }

        .logo-text h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            margin: 0;
        }

        .logo-text p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin: 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
            animation: fadeInUp 1s ease-out;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary);
        }

        .stat-card.active {
            border-color: var(--accent-red);
            background: rgba(239, 68, 68, 0.05);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            margin-top: 0.5rem;
            font-family: 'Outfit', sans-serif;
        }

        .main-content {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            overflow: hidden;
            animation: fadeIn 1.2s ease-out;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(15, 23, 42, 0.5);
            padding: 1.25rem 1.5rem;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
            vertical-align: middle;
        }

        tr {
            transition: background 0.2s ease;
        }

        tr:hover {
            background: rgba(99, 102, 241, 0.05);
        }

        .customer-pill {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .tag {
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .tag-sentiment-positivo {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }

        .tag-sentiment-neutro {
            background: rgba(245, 158, 11, 0.2);
            color: var(--accent-yellow);
            border: 1px solid var(--accent-yellow);
        }

        .tag-sentiment-negativo {
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
        }

        .score-badge {
            display: inline-flex;
            width: 36px;
            height: 36px;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.05);
        }

        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .pagination-btns {
            display: flex;
            gap: 0.5rem;
        }

        .page-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .page-btn:hover:not(:disabled) {
            background: var(--primary);
            border-color: var(--primary);
        }

        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem;
            color: var(--text-muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .refresh-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .refresh-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-container">
            <img src="https://saf.com.br/wp-content/uploads/2025/12/gruposaf-300x212.png" alt="Logo Grupo SAF">
            <div class="logo-text">
                <h1>Painel SAF</h1>
                <p>Monitoramento de Atendimento: em Tempo Real</p>
            </div>
        </div>
        <div style="display:flex; gap:0.5rem; align-items:center">
            <input type="date" id="filter-date" onchange="applyFilters()"
                style="background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius:10px;">

            <select id="filter-view" onchange="applyFilters()"
                style="background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius:10px;">
                <option value="sessions">Visualizar Conversas</option>
                <option value="timeline">Timeline de Atividade</option>
            </select>

            <select id="filter-agent" onchange="applyFilters()"
                style="background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px 15px; border-radius:10px; min-width:180px">
                <option value="all">Todos os Atendentes</option>
            </select>

            <button class="refresh-btn" onclick="fetchData()">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
                </svg>
            </button>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card" onclick="setQuickFilter('all')">
            <div class="stat-label">Total Conversas</div>
            <div class="stat-value" id="count-sessions">0</div>
        </div>
        <div class="stat-card" onclick="setQuickFilter('total_msgs')">
            <div class="stat-label">Total Mensagens</div>
            <div class="stat-value" id="count-messages">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Média Mensagens</div>
            <div class="stat-value" id="avg-score">0.0</div>
        </div>
        <div id="card-critical" class="stat-card" onclick="setQuickFilter('critical')">
            <div class="stat-label">Aguardando (Críticos)</div>
            <div class="stat-value" id="count-critical" style="color: var(--accent-red)">0</div>
        </div>
    </div>

    <div class="main-content">
        <div class="table-card">
            <table id="data-table">
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Atendente</th>
                        <th>Última Mensagem</th>
                        <th>Status</th>
                        <th>Msgs</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Gerado via JS -->
                </tbody>
            </table>

            <div class="pagination">
                <div id="pagination-info" style="font-size: 0.9rem; color: var(--text-muted)">
                    Mostrando 0 de 0 registros
                </div>
                <div class="pagination-btns">
                    <button id="prev-btn" class="page-btn" onclick="changePage(-1)" disabled>Anterior</button>
                    <button id="next-btn" class="page-btn" onclick="changePage(1)" disabled>Próximo</button>
                </div>
            </div>
        </div>

        <div id="loading" class="loading-container"
            style="display: none; justify-content: center; align-items: center; flex-direction: column; gap: 1rem; margin-top: 5rem;">
            <div class="spinner"></div>
            <p>Buscando dados...</p>
        </div>
    </div>

    <script>
        const PAGE_SIZE = 100;
        let CURRENT_PAGE = 1;
        let FILTERED_DATA = []; // Armazena o lote atual filtrado para paginação
        let RAW_MESSAGES = [];
        let CURRENT_QUICK_FILTER = 'all';

        function changePage(direction) {
            CURRENT_PAGE += direction;
            renderPaginatedView();
        }

        function setQuickFilter(type) {
            CURRENT_QUICK_FILTER = type;

            // Visual feedback nos cards
            document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
            if (type === 'critical') document.getElementById('card-critical').classList.add('active');

            CURRENT_PAGE = 1; // Reseta página ao filtrar
            applyFilters();
        }

        async function fetchData() {
            const loading = document.getElementById('loading');
            const tableCard = document.querySelector('.table-card');

            loading.style.display = 'flex';
            tableCard.style.opacity = '0.5';

            try {
                const response = await fetch(WEBHOOK_URL);
                const json = await response.json();

                let allMessages = [];
                const entries = Array.isArray(json) ? json : [json];

                entries.forEach(entry => {
                    const source = entry.body || entry;
                    if (source.data && Array.isArray(source.data)) {
                        source.data.forEach(item => {
                            if (item.message) allMessages.push(item.message);
                            else if (item.chatId) allMessages.push(item);
                        });
                    }
                    else if (source.messages && Array.isArray(source.messages)) {
                        allMessages = [...allMessages, ...source.messages];
                    }
                    else if (source.message && typeof source.message === 'object') {
                        allMessages.push(source.message);
                    }
                    else if (source.chatId && (source.text || source.type)) {
                        allMessages.push(source);
                    }
                });

                RAW_MESSAGES = allMessages;
                populateAgentFilter();

                if (!document.getElementById('filter-date').value) {
                    const today = new Date().toISOString().split('T')[0];
                    document.getElementById('filter-date').value = today;
                }

                applyFilters();
            } catch (error) {
                console.error('Erro na Fetch:', error);
                RAW_MESSAGES = [];
                applyFilters();
            } finally {
                loading.style.display = 'none';
                tableCard.style.opacity = '1';
            }
        }

        function populateAgentFilter() {
            const select = document.getElementById('filter-agent');
            // Pegamos apenas nomes de authorName que não são nulos
            const agents = [...new Set(RAW_MESSAGES
                .filter(m => m.authorName && m.authorName !== 'Admin')
                .map(m => m.authorName))];

            select.innerHTML = '<option value="all">Todos os Atendentes</option>';
            agents.forEach(agent => {
                const opt = document.createElement('option');
                opt.value = agent;
                opt.textContent = agent;
                select.appendChild(opt);
            });
        }

        function applyFilters() {
            const agentFilter = document.getElementById('filter-agent').value;
            const viewType = document.getElementById('filter-view').value;
            const dateFilter = document.getElementById('filter-date').value;

            // 1. Filtro Global por Data
            let filteredMessages = RAW_MESSAGES.filter(m => {
                if (!dateFilter) return true;
                const msgDate = new Date(m.dateTime).toISOString().split('T')[0];
                return msgDate === dateFilter;
            });

            // 2. Lógica para Timeline (Visão Rádio)
            if (viewType === 'timeline') {
                let timelineItems = filteredMessages.sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime));
                if (agentFilter !== 'all') {
                    timelineItems = timelineItems.filter(m => m.authorName === agentFilter);
                }
                FILTERED_DATA = timelineItems;
                updateStats(filteredMessages);
            }
            // 3. Lógica para Sessões (Agregado)
            else {
                const sessionsMap = {};
                filteredMessages.forEach(msg => {
                    const id = msg.chatId || 'Desconhecido';
                    if (!sessionsMap[id]) {
                        sessionsMap[id] = {
                            chatId: id,
                            customer_name: msg.contact?.name || 'Cliente ' + id.substring(id.length - 4),
                            messages: [],
                            last_message: '',
                            last_time: null,
                            last_agent: 'Sistema',
                            is_waiting: false,
                            total_msgs: 0
                        };
                    }
                    sessionsMap[id].messages.push(msg);
                    sessionsMap[id].total_msgs++;

                    const msgDate = new Date(msg.dateTime);
                    if (!sessionsMap[id].last_time || msgDate > new Date(sessionsMap[id].last_time)) {
                        sessionsMap[id].last_time = msg.dateTime;
                        sessionsMap[id].last_message = msg.text || `[${msg.type || 'Mídia'}]`;
                        sessionsMap[id].is_waiting = !msg.isEcho;
                        if (msg.isEcho && msg.authorName) sessionsMap[id].last_agent = msg.authorName;
                    }
                });

                let sessions = Object.values(sessionsMap);
                if (agentFilter !== 'all') sessions = sessions.filter(s => s.last_agent === agentFilter);
                if (CURRENT_QUICK_FILTER === 'critical') sessions = sessions.filter(s => s.is_waiting);

                sessions.sort((a, b) => new Date(b.last_time) - new Date(a.last_time));
                FILTERED_DATA = sessions;
                updateStats(filteredMessages, sessions);
            }

            renderPaginatedView();
        }

        function renderPaginatedView() {
            const startIndex = (CURRENT_PAGE - 1) * PAGE_SIZE;
            const endIndex = startIndex + PAGE_SIZE;
            const pageData = FILTERED_DATA.slice(startIndex, endIndex);
            const viewType = document.getElementById('filter-view').value;

            if (viewType === 'timeline') renderTimeline(pageData);
            else renderSessions(pageData);

            // Atualiza UI da Paginação
            const total = FILTERED_DATA.length;
            document.getElementById('pagination-info').textContent =
                `Mostrando ${Math.min(startIndex + 1, total)}-${Math.min(endIndex, total)} de ${total} registros`;

            document.getElementById('prev-btn').disabled = CURRENT_PAGE === 1;
            document.getElementById('next-btn').disabled = endIndex >= total;
        }

        function updateStats(filteredMessages, sessions = []) {
            const countSessions = sessions.length || [...new Set(filteredMessages.map(m => m.chatId))].length;
            const criticalCount = sessions.length ? sessions.filter(s => s.is_waiting).length : '---';

            document.getElementById('count-sessions').textContent = countSessions;
            document.getElementById('count-messages').textContent = filteredMessages.length;
            document.getElementById('avg-score').textContent = (filteredMessages.length / (countSessions || 1)).toFixed(1);
            document.getElementById('count-critical').textContent = criticalCount;
        }

        function renderTimeline(messages) {
            const thead = document.querySelector('thead tr');
            thead.innerHTML = `
                <th>Horário</th>
                <th>Responsável</th>
                <th>Mensagem</th>
                <th>Tipo</th>
                <th>Status</th>
                <th>Ações</th>
            `;

            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = '';

            messages.forEach(msg => {
                const row = document.createElement('tr');
                const time = new Date(msg.dateTime).toLocaleTimeString('pt-BR');
                const label = msg.isEcho ? '<span style="color:var(--primary)">Oeste</span>' : '<span style="color:var(--accent-green)">Cliente</span>';

                row.innerHTML = `
                    <td>${time}</td>
                    <td><b>${msg.authorName || 'Desconhecido'}</b><br><small>${msg.chatId}</small></td>
                    <td><div style="max-width:400px; font-size:0.9rem">${msg.text || '<i>Mídia</i>'}</div></td>
                    <td><span class="tag">${msg.type}</span></td>
                    <td>${msg.isEcho ? '✅ Enviada' : '📥 Recebida'}</td>
                    <td><button class="refresh-btn" style="font-size:0.7rem" onclick="console.log(${JSON.stringify(msg)})">RAW</button></td>
                `;
                tableBody.appendChild(row);
            });
        }

        function renderSessions(sessions) {
            const thead = document.querySelector('thead tr');
            thead.innerHTML = `
                <th>Cliente</th>
                <th>Atendente</th>
                <th>Última Mensagem</th>
                <th>Status</th>
                <th>Msgs</th>
                <th>Ações</th>
            `;

            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = '';

            sessions.forEach(session => {
                const row = document.createElement('tr');
                const timeStr = new Date(session.last_time).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                const dateStr = new Date(session.last_time).toLocaleDateString('pt-BR');
                const statusTag = session.is_waiting ? 'tag-sentiment-negativo' : 'tag-sentiment-positivo';
                const statusText = session.is_waiting ? 'Aguardando' : 'Respondido';
                const initials = session.customer_name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();

                row.innerHTML = `
                    <td>
                        <div class="customer-pill">
                            <div class="avatar">${initials}</div>
                            <div>
                                <div style="font-weight:600">${session.customer_name}</div>
                                <div style="font-size:0.75rem; color:var(--text-muted)">ID: ${session.chatId}</div>
                            </div>
                        </div>
                    </td>
                    <td><div style="font-weight:600; color:var(--primary)">${session.last_agent}</div></td>
                    <td>
                        <div style="font-size:0.85rem; max-width: 350px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                            ${session.last_message}
                        </div>
                        <div style="font-size:0.7rem; color:var(--text-muted)">${dateStr} às ${timeStr}</div>
                    </td>
                    <td><span class="tag ${statusTag}">${statusText}</span></td>
                    <td><div class="score-badge">${session.total_msgs}</div></td>
                    <td><button class="refresh-btn" style="padding: 5px 10px; font-size: 0.8rem;" onclick="showHistory('${session.chatId}')">Histórico</button></td>
                `;
                tableBody.appendChild(row);
            });
        }

        function showHistory(chatId) {
            const chat = RAW_MESSAGES
                .filter(m => m.chatId === chatId)
                .sort((a, b) => new Date(a.dateTime) - new Date(b.dateTime));

            console.log(`--- HISTÓRICO DA CONVERSA: ${chatId} ---`);
            chat.forEach(m => {
                const label = m.isEcho ? `[${m.authorName || 'Atendente'}]` : `[Cliente]`;
                console.log(`${new Date(m.dateTime).toLocaleString()} ${label}: ${m.text}`);
            });
            alert(`Histórico impresso no Console (F12) para análise detalhada.\nTotal de mensagens: ${chat.length}`);
        }

        function getScoreColor(score) {
            if (score >= 8) return 'var(--accent-green)';
            if (score >= 5) return 'var(--accent-yellow)';
            return 'var(--accent-red)';
        }

        fetchData();
        setInterval(fetchData, 30000); // 30 segundos
    </script>
</body>

</html>
