<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor IA - Atendimento Humano (SAF)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-yellow: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .logo-container h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .logo-container p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
            animation: fadeInUp 1s ease-out;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            border-radius: 20px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            margin-top: 0.5rem;
            font-family: 'Outfit', sans-serif;
        }

        .main-content {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            overflow: hidden;
            animation: fadeIn 1.2s ease-out;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(15, 23, 42, 0.5);
            padding: 1.25rem 1.5rem;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
            vertical-align: middle;
        }

        tr {
            transition: background 0.2s ease;
        }

        tr:hover {
            background: rgba(99, 102, 241, 0.05);
        }

        .customer-pill {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .tag {
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .tag-sentiment-positivo { background: rgba(16, 185, 129, 0.2); color: var(--accent-green); border: 1px solid var(--accent-green); }
        .tag-sentiment-neutro { background: rgba(245, 158, 11, 0.2); color: var(--accent-yellow); border: 1px solid var(--accent-yellow); }
        .tag-sentiment-negativo { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); border: 1px solid var(--accent-red); }

        .score-badge {
            display: inline-flex;
            width: 36px;
            height: 36px;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.05);
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem;
            color: var(--text-muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .refresh-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .refresh-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <h1>Monitor IA SAF</h1>
            <p>Supervisão Inteligente: Backend (n8n) + Lógica Local (JS)</p>
        </div>
        <div style="display:flex; gap:1rem">
            <select id="filter-agent" onchange="applyFilters()" style="background:var(--card-bg); color:white; border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:0.75rem 1rem">
                <option value="all">Todos os Atendentes</option>
            </select>
            <button class="refresh-btn" onclick="fetchData()">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Sincronizar Dados
            </button>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Total de Mensagens</div>
            <div class="stat-value" id="count-messages">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Sessões Filtradas</div>
            <div class="stat-value" id="count-sessions">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Média Score (IA)</div>
            <div class="stat-value" id="avg-score">0.0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Alertas Críticos</div>
            <div class="stat-value" id="count-critical" style="color: var(--accent-red)">0</div>
        </div>
    </div>

    <div class="main-content">
        <table id="data-table">
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Atendente</th>
                    <th>Monitoramento Local (Métricas)</th>
                    <th>Sentimento (IA)</th>
                    <th>Qualidade</th>
                    <th>Visualizar</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- Data will be injected here -->
            </tbody>
        </table>

        <div id="loading" class="loading-container">
            <div class="spinner"></div>
            <p>Buscando objetos brutos da API Muvecom/n8n...</p>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = 'https://api.muvecom.com.br/v1/a4e5db67-6733-4e37-b4ba-6a02ac23baf3';
        let RAW_DATA = [];

        async function fetchData() {
            const loading = document.getElementById('loading');
            loading.style.display = 'flex';

            try {
                const response = await fetch(WEBHOOK_URL);
                const data = await response.json();
                
                RAW_DATA = Array.isArray(data) ? data : null;
                populateAgentFilter();
                applyFilters();
            } catch (error) {
                console.error('Erro na Fetch:', error);
                RAW_DATA = null;
                populateAgentFilter();
                applyFilters();
            } finally {
                loading.style.display = 'none';
            }
        }

        function populateAgentFilter() {
            const select = document.getElementById('filter-agent');
            const agents = [...new Set(RAW_DATA.map(item => item.agent?.name || 'Sistema'))];
            
            select.innerHTML = '<option value="all">Todos os Atendentes</option>';
            agents.forEach(agent => {
                const opt = document.createElement('option');
                opt.value = agent;
                opt.textContent = agent;
                select.appendChild(opt);
            });
        }

        function applyFilters() {
            const agentFilter = document.getElementById('filter-agent').value;
            let filtered = RAW_DATA;

            if (agentFilter !== 'all') {
                filtered = RAW_DATA.filter(item => (item.agent?.name || 'Sistema') === agentFilter);
            }

            renderData(filtered);
        }

        function renderData(items) {
            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = '';
            
            let totalScore = 0;
            let totalMsgs = 0;
            let criticalCount = 0;

            items.forEach(item => {
                const row = document.createElement('tr');
                
                const msgCount = Array.isArray(item.messages) ? item.messages.length : 0;
                totalMsgs += msgCount;
                
                const initials = item.customer_name ? item.customer_name.split(' ').map(n => n[0]).join('').substring(0,2) : '??';
                const sentimentClass = `tag-sentiment-${(item.ai_sentiment || 'neutro').toLowerCase()}`;
                
                totalScore += (item.ai_score || 0);
                if (item.ai_sentiment?.toLowerCase() === 'negativo') criticalCount++;

                row.innerHTML = `
                    <td>
                        <div class="customer-pill">
                            <div class="avatar">${initials}</div>
                            <div>
                                <div style="font-weight:600">${item.customer_name || 'Desconhecido'}</div>
                                <div style="font-size:0.75rem; color:var(--text-muted)">ID: ${item.session_id}</div>
                            </div>
                        </div>
                    </td>
                    <td><div style="font-weight:600; color:var(--primary)">${item.agent?.name || 'Em espera'}</div></td>
                    <td><span style="font-size:0.8rem">Troca de mensagens: <b>${msgCount}</b></span></td>
                    <td><span class="tag ${sentimentClass}">${item.ai_sentiment || 'Neutro'}</span></td>
                    <td><div class="score-badge" style="color: ${getScoreColor(item.ai_score)}">${item.ai_score || '-'}</div></td>
                    <td><button style="background:none; border: 1px solid rgba(255,255,255,0.1); color: white; padding: 5px 10px; border-radius:8px; cursor:pointer" onclick="console.log(${JSON.stringify(item)})">Log RAW</button></td>
                `;
                tableBody.appendChild(row);
            });

            document.getElementById('count-sessions').textContent = items.length;
            document.getElementById('count-messages').textContent = totalMsgs;
            document.getElementById('avg-score').textContent = items.length ? (totalScore / items.length).toFixed(1) : '0.0';
            document.getElementById('count-critical').textContent = criticalCount;
        }

        function getScoreColor(score) {
            if (score >= 8) return 'var(--accent-green)';
            if (score >= 5) return 'var(--accent-yellow)';
            return 'var(--accent-red)';
        }

        fetchData();
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
