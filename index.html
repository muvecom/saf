<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor IA - Atendimento Humano (SAF)</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-yellow: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .logo-container img {
            height: 45px;
            filter: brightness(1.2) drop-shadow(0 0 10px rgba(255,255,255,0.2));
            transition: transform 0.3s ease;
        }

        .logo-container img:hover {
            transform: scale(1.05);
        }

        .logo-text h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            margin: 0;
        }

        .logo-text p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin: 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
            animation: fadeInUp 1s ease-out;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            border-radius: 20px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            margin-top: 0.5rem;
            font-family: 'Outfit', sans-serif;
        }

        .main-content {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            overflow: hidden;
            animation: fadeIn 1.2s ease-out;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(15, 23, 42, 0.5);
            padding: 1.25rem 1.5rem;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
            vertical-align: middle;
        }

        tr {
            transition: background 0.2s ease;
        }

        tr:hover {
            background: rgba(99, 102, 241, 0.05);
        }

        .customer-pill {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .tag {
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .tag-sentiment-positivo {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }

        .tag-sentiment-neutro {
            background: rgba(245, 158, 11, 0.2);
            color: var(--accent-yellow);
            border: 1px solid var(--accent-yellow);
        }

        .tag-sentiment-negativo {
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
        }

        .score-badge {
            display: inline-flex;
            width: 36px;
            height: 36px;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.05);
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem;
            color: var(--text-muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .refresh-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .refresh-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-container">
            <img src="https://saf.com.br/wp-content/uploads/2025/12/gruposaf-300x212.png" alt="Logo Grupo SAF">
            <div class="logo-text">
                <h1>Painel SAF</h1>
                <p>Monitoramento de Atendimento: Wazzup em Tempo Real</p>
            </div>
        </div>
        <div style="display:flex; gap:1rem">
            <select id="filter-agent" onchange="applyFilters()"
                style="background:var(--card-bg); color:white; border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:0.75rem 1rem">
                <option value="all">Todos os Atendentes</option>
            </select>
            <button class="refresh-btn" onclick="fetchData()">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                    </path>
                </svg>
                Sincronizar Dados
            </button>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Total de Mensagens</div>
            <div class="stat-value" id="count-messages">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Sessões Filtradas</div>
            <div class="stat-value" id="count-sessions">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Média Score (IA)</div>
            <div class="stat-value" id="avg-score">0.0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Alertas Críticos</div>
            <div class="stat-value" id="count-critical" style="color: var(--accent-red)">0</div>
        </div>
    </div>

    <div class="main-content">
        <table id="data-table">
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Atendente</th>
                    <th>Monitoramento Local (Métricas)</th>
                    <th>Sentimento (IA)</th>
                    <th>Qualidade</th>
                    <th>Visualizar</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- Data will be injected here -->
            </tbody>
        </table>

        <div id="loading" class="loading-container">
            <div class="spinner"></div>
            <p>Buscando dados...</p>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = 'https://api.muvecom.com.br/v1/a4e5db67-6733-4e37-b4ba-6a02ac23baf3';
        let RAW_MESSAGES = [];

        async function fetchData() {
            const loading = document.getElementById('loading');
            loading.style.display = 'flex';

            try {
                const response = await fetch(WEBHOOK_URL);
                const json = await response.json();

                let allMessages = [];
                const entries = Array.isArray(json) ? json : [json];

                entries.forEach(entry => {
                    const source = entry.body || entry;
                    
                    // Extrai mensagens da Wazzup (formato esperado body.messages[])
                    if (source.messages && Array.isArray(source.messages)) {
                        allMessages = [...allMessages, ...source.messages];
                    } 
                    // Fallback para mensagens soltas
                    else if (source.chatId && source.text) {
                        allMessages.push(source);
                    }
                });

                RAW_MESSAGES = allMessages;
                populateAgentFilter();
                applyFilters();
            } catch (error) {
                console.error('Erro na Fetch:', error);
                RAW_MESSAGES = [];
                applyFilters();
            } finally {
                loading.style.display = 'none';
            }
        }

        function populateAgentFilter() {
            const select = document.getElementById('filter-agent');
            // Pegamos apenas nomes de authorName que não são nulos
            const agents = [...new Set(RAW_MESSAGES
                .filter(m => m.authorName && m.authorName !== 'Admin')
                .map(m => m.authorName))];

            select.innerHTML = '<option value="all">Todos os Atendentes</option>';
            agents.forEach(agent => {
                const opt = document.createElement('option');
                opt.value = agent;
                opt.textContent = agent;
                select.appendChild(opt);
            });
        }

        function applyFilters() {
            const agentFilter = document.getElementById('filter-agent').value;
            
            // AGRUPAMENTO EM SESSÕES (Agrupar por chatId)
            const sessionsMap = {};

            RAW_MESSAGES.forEach(msg => {
                const id = msg.chatId;
                if (!sessionsMap[id]) {
                    sessionsMap[id] = {
                        chatId: id,
                        customer_name: msg.contact?.name || 'Cliente ' + id.substring(id.length - 4),
                        messages: [],
                        last_message: '',
                        last_time: null,
                        last_agent: 'Sistema',
                        is_waiting: false,
                        total_msgs: 0
                    };
                }

                sessionsMap[id].messages.push(msg);
                sessionsMap[id].total_msgs++;

                // Lógica de Atualização da "Capa" da Sessão
                const msgDate = new Date(msg.dateTime);
                if (!sessionsMap[id].last_time || msgDate > new Date(sessionsMap[id].last_time)) {
                    sessionsMap[id].last_time = msg.dateTime;
                    sessionsMap[id].last_message = msg.text;
                    sessionsMap[id].is_waiting = !msg.isEcho; // Se a última não é echo, estamos esperando o humano
                    
                    if (msg.isEcho && msg.authorName) {
                        sessionsMap[id].last_agent = msg.authorName;
                    }
                }
            });

            let sessions = Object.values(sessionsMap);

            // Filtro por Atendente (quem deu a última resposta ou está na sessão)
            if (agentFilter !== 'all') {
                sessions = sessions.filter(s => s.last_agent === agentFilter);
            }

            // Ordenar por horário da mensagem mais recente
            sessions.sort((a, b) => new Date(b.last_time) - new Date(a.last_time));

            renderData(sessions);
        }

        function renderData(sessions) {
            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = '';

            let criticalCount = 0;

            sessions.forEach(session => {
                const row = document.createElement('tr');
                
                const initials = session.customer_name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                const timeStr = new Date(session.last_time).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                const dateStr = new Date(session.last_time).toLocaleDateString('pt-BR');
                
                if (session.is_waiting) criticalCount++;

                const statusTag = session.is_waiting ? 'tag-sentiment-negativo' : 'tag-sentiment-positivo';
                const statusText = session.is_waiting ? 'Aguardando' : 'Respondido';

                row.innerHTML = `
                    <td>
                        <div class="customer-pill">
                            <div class="avatar">${initials}</div>
                            <div>
                                <div style="font-weight:600">${session.customer_name}</div>
                                <div style="font-size:0.75rem; color:var(--text-muted)">ID: ${session.chatId}</div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <div style="font-weight:600; color:var(--primary)">${session.last_agent}</div>
                        <div style="font-size:0.75rem; color:var(--text-muted)">Última resp.</div>
                    </td>
                    <td>
                        <div style="font-size:0.85rem; max-width: 350px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${session.last_message}">
                            ${session.last_message || '<i>Mensagem de mídia</i>'}
                        </div>
                        <div style="font-size:0.7rem; color:var(--text-muted)">${dateStr} às ${timeStr}</div>
                    </td>
                    <td><span class="tag ${statusTag}">${statusText}</span></td>
                    <td><div class="score-badge">${session.total_msgs}</div></td>
                    <td>
                        <button class="refresh-btn" style="padding: 5px 10px; font-size: 0.8rem; background: rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1)" 
                                onclick="showHistory('${session.chatId}')">
                            Histórico
                        </button>
                    </td>
                `;
                tableBody.appendChild(row);
            });

            document.getElementById('count-sessions').textContent = sessions.length;
            document.getElementById('count-messages').textContent = RAW_MESSAGES.length;
            document.getElementById('avg-score').textContent = (RAW_MESSAGES.length / (sessions.length || 1)).toFixed(1);
            document.getElementById('count-critical').textContent = criticalCount;
        }

        function showHistory(chatId) {
            const chat = RAW_MESSAGES
                .filter(m => m.chatId === chatId)
                .sort((a,b) => new Date(a.dateTime) - new Date(b.dateTime));
            
            console.log(`--- HISTÓRICO DA CONVERSA: ${chatId} ---`);
            chat.forEach(m => {
                const label = m.isEcho ? `[${m.authorName || 'Atendente'}]` : `[Cliente]`;
                console.log(`${new Date(m.dateTime).toLocaleString()} ${label}: ${m.text}`);
            });
            alert(`Histórico impresso no Console (F12) para análise detalhada.\nTotal de mensagens: ${chat.length}`);
        }

        function getScoreColor(score) {
            if (score >= 8) return 'var(--accent-green)';
            if (score >= 5) return 'var(--accent-yellow)';
            return 'var(--accent-red)';
        }

        fetchData();
        setInterval(fetchData, 30000); // 30 segundos
    </script>
</body>

</html>
